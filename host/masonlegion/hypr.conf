# Host-specific overrides for masonlegion.
# Keep this file minimal; aggressive DRM pinning can prevent session startup
# on some boots/driver states.
#
# If needed for troubleshooting, you can temporarily test:
# env = AQ_DRM_DEVICES,/dev/dri/by-path/pci-0000:00:02.0-card

# Prefer the NVIDIA dGPU for new apps in this Hyprland session.
# This mirrors the usual prime-run environment without requiring a wrapper
# per application.
env = DRI_PRIME,1
env = __NV_PRIME_RENDER_OFFLOAD,1
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = __VK_LAYER_NV_optimus,NVIDIA_only
